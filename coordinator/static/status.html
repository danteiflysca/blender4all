<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Farmhand — Render farm</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c0e; --panel: #111316; --panel-2: #15181c;
      --border: #2a2f36; --border-soft: #1d2126;
      --text: #e7e9ec; --muted: #9aa1ab; --faint: #6b7280;
      --accent: #f5792a; --done: #3fb950; --failed: #f85149;
      --pending: #3a4048; --sans: Inter, Geist, system-ui, sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body { font: 14px/1.5 var(--sans); }
    button, input { font: 500 13px/1 var(--sans); }
    button { color: var(--text); background: transparent; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; }
    button:hover { border-color: #59616c; background: var(--panel-2); }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .app { display: grid; grid-template: 56px minmax(0, 1fr) / 304px minmax(0, 1fr); min-height: 100vh; }
    header { grid-column: 1 / -1; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 18px; gap: 22px; }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 650; letter-spacing: -.03em; }
    .brand-mark { width: 26px; height: 26px; color: var(--accent); }
    .live { border-left: 1px solid var(--border); padding-left: 22px; color: var(--muted); font-size: 12px; }
    .live::before { content: ""; display: inline-block; width: 7px; height: 7px; margin-right: 8px; border-radius: 50%; background: var(--done); }
    .settings { width: 34px; height: 34px; margin-left: auto; display: grid; place-items: center; font-size: 17px; }
    aside { border-right: 1px solid var(--border); padding: 18px 12px; min-width: 0; overflow: auto; }
    .rail-title { display: flex; align-items: center; justify-content: space-between; padding: 0 6px 12px; }
    h2, h3, p { margin: 0; }
    .rail-title h2 { font-size: 15px; }
    .job-list { display: grid; gap: 2px; }
    .job { width: 100%; text-align: left; border: 0; border-bottom: 1px solid var(--border-soft); padding: 13px 10px 13px 18px; border-radius: 0; position: relative; }
    .job[aria-current="true"] { background: var(--panel-2); }
    .job[aria-current="true"]::before { content: ""; position: absolute; left: 0; top: 7px; bottom: 7px; width: 3px; background: var(--accent); border-radius: 2px; }
    .job-top, .job-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .job-name { font: 500 13px var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-meta { color: var(--faint); font: 11px var(--mono); margin-top: 7px; }
    .state { font: 600 10px var(--mono); text-transform: capitalize; }
    .state.active { color: var(--accent); } .state.complete { color: var(--done); }
    .state.cancelled { color: var(--failed); }
    .empty { padding: 28px 10px; color: var(--faint); text-align: center; }
    main { min-width: 0; padding: 22px 26px 28px; overflow: auto; }
    .job-head { display: grid; grid-template-columns: minmax(250px, 1fr) auto auto auto; align-items: center; gap: 28px; margin-bottom: 16px; }
    .job-head h1 { margin: 0 0 5px; font: 600 24px/1.2 var(--mono); letter-spacing: -.025em; }
    .job-range, .metric-label { color: var(--muted); font: 11px var(--mono); }
    .metric { min-width: 90px; }
    .metric-value { font: 500 16px var(--mono); margin-bottom: 3px; }
    .cancel { height: 36px; padding: 0 18px; border-color: var(--accent); color: var(--accent); }
    .progress-track { height: 7px; background: #252a30; margin-bottom: 18px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }
    .panel { border: 1px solid var(--border); background: rgba(17, 19, 22, .62); }
    .frame-panel { padding: 14px 16px 10px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 12px; }
    .panel-head h2, .panel-title { font-size: 14px; font-weight: 600; }
    .legend { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; color: var(--muted); font: 10px var(--mono); }
    .legend i { width: 9px; height: 9px; display: inline-block; margin-right: 6px; border-radius: 2px; }
    .frame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(39px, 1fr)); gap: 4px; }
    .frame { height: 27px; display: grid; place-items: center; border-radius: 2px; font: 9px var(--mono); color: #f1f3f5; background: var(--pending); border: 0; }
    .frame.done { background: #2f7d29; } .frame.rendering { background: var(--accent); }
    .frame.failed { background: var(--failed); } .frame.selected { outline: 2px solid white; outline-offset: 1px; }
    .frame-foot { display: flex; justify-content: space-between; align-items: center; color: var(--faint); font: 10px var(--mono); margin-top: 10px; }
    .download { padding: 8px 12px; }
    .lower { display: grid; grid-template-columns: minmax(360px, .9fr) minmax(440px, 1.1fr); gap: 10px; margin-top: 10px; }
    .lower .panel { min-height: 235px; padding: 13px; }
    .table-wrap { margin-top: 10px; border: 1px solid var(--border); overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font: 10px var(--mono); }
    th { text-align: left; color: var(--muted); background: var(--panel-2); font-weight: 500; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border-soft); }
    tr:last-child td { border-bottom: 0; }
    tr.stale { opacity: .4; }
    .failure { margin-top: 10px; border: 1px solid var(--border); display: grid; grid-template-columns: 72px minmax(0, 1fr); min-height: 170px; }
    .failure-list { border-right: 1px solid var(--border); }
    .failure-list button { width: 100%; border: 0; border-radius: 0; padding: 12px 8px; color: var(--failed); font: 500 11px var(--mono); }
    .failure-detail { padding: 12px; min-width: 0; display: flex; flex-direction: column; }
    pre { flex: 1; margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; color: #c8cdd3; font: 10px/1.55 var(--mono); max-height: 120px; overflow: auto; }
    .requeue { align-self: end; padding: 8px 18px; color: var(--accent); border-color: var(--accent); margin-top: 8px; }
    .connection { display: none; max-width: 470px; margin: 100px auto; padding: 26px; }
    .connection h1 { font-size: 21px; margin: 0 0 8px; }
    .connection p { color: var(--muted); margin-bottom: 18px; }
    .connection form { display: flex; gap: 8px; }
    .connection input { flex: 1; min-width: 0; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 11px; border-radius: 5px; }
    .connection button { padding: 0 16px; border-color: var(--accent); color: var(--accent); }
    .error { color: var(--failed); font-size: 12px; margin-top: 10px; min-height: 18px; }
    @media (max-width: 980px) {
      .app { grid-template-columns: 230px minmax(0, 1fr); }
      .lower { grid-template-columns: 1fr; }
      .job-head { grid-template-columns: 1fr auto auto; }
      .cancel { grid-column: 1 / -1; justify-self: end; }
    }
    @media (max-width: 700px) {
      .app { display: block; }
      header { height: 56px; position: sticky; top: 0; z-index: 2; background: var(--bg); }
      aside { border-right: 0; border-bottom: 1px solid var(--border); max-height: 210px; }
      main { padding: 18px 14px; }
      .job-head { grid-template-columns: 1fr 1fr; gap: 14px; }
      .job-head > :first-child { grid-column: 1 / -1; }
      .cancel { grid-column: auto; justify-self: stretch; }
      .lower { display: block; }
      .lower .panel + .panel { margin-top: 10px; }
      .legend { display: none; }
    }
    @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M4 16h8l-5-5 3-3 6 6a9 9 0 1 1-1.7 10H19a5 5 0 1 0 0-5H4zm9-13 6 7-3 3-7-7z"/></svg>
        Farmhand
      </div>
      <div class="live" id="liveLabel">Connected to farm</div>
      <button class="settings" id="settingsButton" aria-label="Change farm token">⚙</button>
    </header>

    <aside id="rail">
      <div class="rail-title"><h2>Render jobs</h2><span id="jobCount">0</span></div>
      <div class="job-list" id="jobList"></div>
    </aside>

    <main id="main">
      <section class="connection panel" id="connection">
        <h1>Connect to Farmhand</h1>
        <p>Enter the shared LAN token configured on the coordinator.</p>
        <form id="tokenForm"><input id="tokenInput" type="password" autocomplete="current-password" aria-label="Farm token"><button>Connect</button></form>
        <div class="error" id="connectionError"></div>
      </section>
      <section id="dashboard" hidden>
        <div class="job-head">
          <div><h1 id="jobName">—</h1><div class="job-range" id="jobRange"></div></div>
          <div class="metric"><div class="metric-value" id="jobProgress">0 / 0</div><div class="metric-label">Done / Total</div></div>
          <div class="metric"><div class="metric-value" id="eta">—</div><div class="metric-label">ETA</div></div>
          <button class="cancel" id="cancelButton">Cancel job</button>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

        <section class="panel frame-panel">
          <div class="panel-head"><h2>Frame progress</h2><div class="legend">
            <span><i style="background:var(--pending)"></i>Pending</span><span><i style="background:var(--accent)"></i>Rendering</span><span><i style="background:var(--done)"></i>Done</span><span><i style="background:var(--failed)"></i>Failed</span>
          </div></div>
          <div class="frame-grid" id="frameGrid"></div>
          <div class="frame-foot"><span id="frameRange"></span><button class="download" id="downloadButton">⇩&nbsp; Download frames</button></div>
        </section>

        <div class="lower">
          <section class="panel"><h2 class="panel-title">Workers</h2><div class="table-wrap"><table>
            <thead><tr><th>Worker ID</th><th>Blender version</th><th>Current frame</th><th>Last seen</th></tr></thead><tbody id="workerRows"></tbody>
          </table></div></section>
          <section class="panel"><h2 class="panel-title">Failed frames</h2><div class="failure" id="failurePanel">
            <div class="failure-list" id="failureList"></div><div class="failure-detail"><pre id="failureText">No failed frames.</pre><button class="requeue" id="requeueButton" hidden>Requeue</button></div>
          </div></section>
        </div>
      </section>
    </main>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const state = { token: localStorage.getItem('farmhand_token') || '', jobs: [], selected: null, job: null, failedFrame: null };
    const api = async (path, options = {}) => {
      const response = await fetch(path, { ...options, headers: { 'X-Farm-Token': state.token, ...(options.headers || {}) } });
      if (response.status === 401) throw new Error('The farm token was not accepted.');
      if (!response.ok) { const body = await response.json().catch(() => ({})); throw new Error(body.detail || `Request failed (${response.status})`); }
      return response.status === 204 ? null : response;
    };
    const escapeText = (value) => String(value ?? '');
    const formatEta = (seconds) => {
      if (seconds == null) return 'Calculating…';
      seconds = Math.max(0, Math.round(seconds));
      const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = seconds % 60;
      return [h, m, s].map(value => String(value).padStart(2, '0')).join(':');
    };
    const showConnection = (message = '') => {
      $('connection').style.display = 'block'; $('dashboard').hidden = true; $('rail').style.visibility = 'hidden';
      $('connectionError').textContent = message;
    };
    const showDashboard = () => { $('connection').style.display = 'none'; $('dashboard').hidden = false; $('rail').style.visibility = 'visible'; };
    function renderJobs() {
      $('jobCount').textContent = state.jobs.length;
      $('jobList').replaceChildren(...state.jobs.map(job => {
        const button = document.createElement('button'); button.className = 'job'; button.dataset.jobId = job.id;
        button.setAttribute('aria-current', String(job.id === state.selected));
        const top = document.createElement('div'); top.className = 'job-top';
        const name = document.createElement('span'); name.className = 'job-name'; name.textContent = job.name;
        const status = document.createElement('span'); status.className = `state ${job.status}`; status.textContent = job.status;
        const meta = document.createElement('div'); meta.className = 'job-meta';
        meta.innerHTML = `<span>Frames ${job.frame_start}–${job.frame_end}</span><span>${job.done} / ${job.total}</span>`;
        top.append(name, status); button.append(top, meta); button.addEventListener('click', () => selectJob(job.id)); return button;
      }));
      if (!state.jobs.length) { const empty = document.createElement('div'); empty.className = 'empty'; empty.textContent = 'No render jobs yet.'; $('jobList').append(empty); }
    }
    function renderJob() {
      const job = state.job; if (!job) return;
      const total = job.frames.length, done = job.counts.done;
      $('jobName').textContent = job.name; $('jobRange').textContent = `Frames ${job.frame_start}–${job.frame_end}`;
      $('jobProgress').textContent = `${done} / ${total}`; $('eta').textContent = formatEta(job.eta_seconds);
      $('progressFill').style.width = `${total ? done / total * 100 : 0}%`;
      $('cancelButton').disabled = job.status !== 'active';
      $('frameRange').textContent = `Frame range: ${job.frame_start}–${job.frame_end} (${total} total)`;
      $('downloadButton').disabled = done === 0;
      $('frameGrid').replaceChildren(...job.frames.map(item => {
        const square = document.createElement('button'); square.className = `frame ${item.state}`; square.textContent = item.frame;
        square.title = `Frame ${item.frame}: ${item.state}`;
        if (item.state === 'failed') square.addEventListener('click', () => selectFailure(item.frame));
        return square;
      }));
      $('workerRows').replaceChildren(...job.workers.map(worker => {
        const row = document.createElement('tr'); if (worker.stale) row.className = 'stale';
        [worker.worker_id, worker.blender_version, worker.current_frame ?? 'Idle', `${worker.last_seen_seconds}s ago`].forEach(value => { const cell = document.createElement('td'); cell.textContent = value; row.append(cell); }); return row;
      }));
      renderFailures();
    }
    function renderFailures() {
      const failures = state.job.frames.filter(frame => frame.state === 'failed');
      $('failureList').replaceChildren(...failures.map(frame => { const button = document.createElement('button'); button.textContent = frame.frame; button.addEventListener('click', () => selectFailure(frame.frame)); return button; }));
      if (!failures.length) { state.failedFrame = null; $('failureText').textContent = 'No failed frames.'; $('requeueButton').hidden = true; return; }
      if (!failures.some(frame => frame.frame === state.failedFrame)) state.failedFrame = failures[0].frame;
      const selected = failures.find(frame => frame.frame === state.failedFrame);
      $('failureText').textContent = selected.stderr_tail || 'No error output was captured.'; $('requeueButton').hidden = false;
    }
    function selectFailure(frame) { state.failedFrame = frame; renderFailures(); }
    async function loadJobs() {
      try {
        const response = await api('/jobs'); state.jobs = await response.json();
        if (!state.selected || !state.jobs.some(job => job.id === state.selected)) state.selected = state.jobs[0]?.id || null;
        renderJobs(); if (state.selected) await selectJob(state.selected, false); else { showDashboard(); $('dashboard').hidden = false; }
        $('liveLabel').textContent = 'Connected to farm';
      } catch (error) { showConnection(error.message); }
    }
    async function selectJob(jobId, rerenderJobs = true) {
      state.selected = jobId;
      try { const response = await api(`/jobs/${jobId}`); state.job = await response.json(); showDashboard(); if (rerenderJobs) renderJobs(); renderJob(); }
      catch (error) { if (error.message.includes('token')) showConnection(error.message); else $('liveLabel').textContent = error.message; }
    }
    $('tokenForm').addEventListener('submit', event => { event.preventDefault(); state.token = $('tokenInput').value; localStorage.setItem('farmhand_token', state.token); loadJobs(); });
    $('settingsButton').addEventListener('click', () => { $('tokenInput').value = state.token; showConnection(); $('tokenInput').focus(); });
    $('cancelButton').addEventListener('click', async () => { if (!state.selected || !confirm('Cancel this render job?')) return; await api(`/jobs/${state.selected}/cancel`, { method: 'POST' }); await loadJobs(); });
    $('downloadButton').addEventListener('click', async () => { const response = await api(`/jobs/${state.selected}/frames.zip`); const blob = await response.blob(); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `${state.selected}-frames.zip`; link.click(); setTimeout(() => URL.revokeObjectURL(link.href), 1000); });
    $('requeueButton').addEventListener('click', async () => { await api(`/jobs/${state.selected}/frames/${state.failedFrame}/requeue`, { method: 'POST' }); await selectJob(state.selected); });
    if (state.token) loadJobs(); else showConnection();
    setInterval(() => { if (state.token && state.selected && !$('dashboard').hidden) loadJobs(); }, 3000);
  </script>
</body>
</html>
